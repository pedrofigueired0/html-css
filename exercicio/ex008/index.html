<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de Textos</title>
</head>
<body>
    <h1>Principais Formatações</h1>
    <h2>Netrito e Destaque</h2>
    <p>
        Nessa frase temos um <b>Texto em negrito</b> usando o b 
        <p>Nessa frase temos <strong>texto em negrito</strong></p>
        <p>Nesse texto temos o <i>Italico</i></p>
        <p>esse tambem estam <em>italico</em></p>
    </p>
</body>
</html>
